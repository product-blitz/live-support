name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Stub env vars — only enough to make `next build` succeed.
      # Real values are set in Vercel for deploy. We intentionally do NOT
      # put real secrets in CI.
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
      HMS_APP_ACCESS_KEY: stub
      HMS_APP_SECRET: stub
      HMS_TEMPLATE_ID: stub
      HMS_SUBDOMAIN: stub.app.100ms.live
      RESEND_API_KEY: stub
      RESEND_FROM_EMAIL: stub@example.com
      NEXT_PUBLIC_APP_URL: https://stub.example.com
      CUSTOMER_JWT_SECRET: stubstubstubstubstubstubstubstubstubstubstubstubstubstubstubstub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
